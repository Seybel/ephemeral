 @keyframes fadeIn {

<body class="font-sans min-h-screen bg-[#0a0907] text-[#f0ead8] antialiased">
    <div id="app"></div>
    <div id="toast-root" class="fixed inset-x-0 bottom-0 z-[60] flex flex-col items-stretch gap-3 px-4 sm:items-end sm:px-6 pointer-events-none pb-[calc(4.75rem+env(safe-area-inset-bottom,0px))]" aria-live="polite"></div>

    <script>
        const weeklyThemes = [
            {
                id: 1,
                name: "Midnight Confessions",
                color: "#c8a96e",
                icon: "moon",
                season: "Winter 2024",
                writeBlurb:
                    "Explore impermanence, confession, and the\nthings we only dare say in the dark."
            },
            {
                id: 2,
                name: "Fragments of Light",
                color: "#c8a96e",
                icon: "sun",
                season: "Winter 2024",
                writeBlurb: "Light that breaks, scatters, and refuses\nto be held. Write what gleams and fades."
            },
            {
                id: 3,
                name: "Ephemeral Gardens",
                color: "#c8a96e",
                icon: "leaf",
                season: "Spring 2024",
                writeBlurb: "Growth that wilts on purpose. Stories rooted\nin the season of letting go."
            },
            {
                id: 4,
                name: "Neon Dreams",
                color: "#c8a96e",
                icon: "star",
                season: "Spring 2024",
                writeBlurb: "Bright fictions that burn out before dawn.\nHonesty under electric haze."
            }
        ];

        const currentTheme = weeklyThemes[0];

        const themeWeekEndsAt = new Date(Date.now() + 5 * 24 * 60 * 60 * 1000);

        const authors = [
            { id: 1, name: "Elias Thorne", handle: "@eliast", avatar: "ET" },
            { id: 2, name: "Mira Solis", handle: "@mirasolis", avatar: "MS" },
            { id: 3, name: "Juno Vega", handle: "@juno", avatar: "JV" },
            { id: 4, name: "Caspian Reed", handle: "@caspian", avatar: "CR" }
        ];

        const pastThemesStats = [
            { name: "Fragments of Light", count: 128 },
            { name: "Ephemeral Gardens", count: 94 },
            { name: "Neon Dreams", count: 61 }
        ];

        const topAuthorsWeek = [
            { rank: 1, author: authors[0], score: 436 },
            { rank: 2, author: authors[2], score: 412 },
            { rank: 3, author: authors[1], score: 321 },
            { rank: 4, author: authors[3], score: 245 }
        ];

        const posts = [
            {
                id: 1,
                title: "The Art of Vanishing",
                content: "There's something liberating about writing that won't last forever. Like footprints in sand before the tide comes. I've been thinking about permanence lately—how we clutch at digital archives as if they'll outlive us. But what if the beauty is in the transient? In knowing this moment, these words, exist only for those who choose to witness them now.",
                author: authors[0],
                createdAt: new Date(Date.now() -2 *60 *60 *1000),
                expiresAt: new Date(Date.now() + 22 * 60 * 60 * 1000),
                likes: 247,
                readingTime: 4,
                excerpt: "There's something liberating about writing that won't last forever..."
            },
            {
                id: 2,
                title: "Counting Backwards",
                content: "My grandmother had a peculiar ritual. Every evening, she'd sit by the window and watch the sun set. Not for the beauty, she said, but for the math. 'Twelve minutes from now,' she'd whisper, 'it will be gone.' She lived her entire life aware of endings. I think that's why her stories felt so urgent, so alive. They knew they were temporary.",
                author: authors[1],
 createdAt: new Date(Date.now() - 5 * 60 * 60 * 1000),
                expiresAt: new Date(Date.now() + 19 * 60 * 60 * 1000),
                likes: 189,
                readingTime: 6,
                excerpt: "My grandmother had a peculiar ritual. Every evening, she'd sit by the window..."
            },
            {
                id: 3,
                title: "Digital Ghosts",
                content: "We leave so much behind. Comments, likes, screenshots of conversations we meant to delete. But here, in this space, nothing lingers. I find that honest. There's no algorithm surfacing my old thoughts. No dredging up who I was five years ago. Just now. Just this.",
                author: authors[2],
                createdAt: new Date(Date.now() - 8 * 60 * 60 * 1000),
                expiresAt: new Date(Date.now() + 16 * 60 * 60 * 1000),
                likes: 412,
                readingTime: 3,
                excerpt: "We leave so much behind. Comments, likes, screenshots of conversations..."
            },
            {
                id: 4,
                title: "Tomorrow's Yesterday",
                content: "I'm writing this knowing it will disappear. Not archived. Not saved. Just words floating into the void after twenty-four hours. It changes how I write. I'm more honest. Less performative. There's no future employer scrolling through these thoughts. No context collapse. Just the truth, briefly illuminated.",
                author: authors[3],
                createdAt: new Date(Date.now() - 12 * 60 * 60 * 1000),
                expiresAt: new Date(Date.now() + 12 * 60 * 60 * 1000),
                likes: 156,
                readingTime: 5,
                excerpt: "I'm writing this knowing it will disappear. Not archived. Not saved..."
            },
            {
                id: 5,
                title: "The Weight of Forever",
                content: "Social media taught us to perform eternity. Every post, a monument. Every photo, a memorial. But monuments decay. They just do it slowly enough that we pretend otherwise. Here, the decay is the point. The clock ticking down is not a threat. It's a promise that this moment matters precisely because it won't last.",
                author: authors[0],
                createdAt: new Date(Date.now() - 18 * 60 * 60 * 1000),
                expiresAt: new Date(Date.now() + 6 * 60 * 60 * 1000),
                likes: 89,
                readingTime: 4,
                excerpt: "Social media taught us to perform eternity. Every post, a monument..."
            }
        ];

        let currentView = 'home';
        let selectedPost = null;
        let filter = 'all';
        let searchQuery = '';
        let likedPosts = new Set();
        let newPost = { title: '', content: '', duration: 24 };

        const STORAGE_KEY = 'ephemeral.app.v1';

        function persistState() {
            try {
                const payload = {
                    posts: posts.map((p) => ({
                        ...p,
                        createdAt: p.createdAt instanceof Date ? p.createdAt.toISOString() : p.createdAt,
                        expiresAt: p.expiresAt instanceof Date ? p.expiresAt.toISOString() : p.expiresAt
                    })),
                    likedPostIds: Array.from(likedPosts),
                    newPost: { ...newPost },
                    filter,
                    searchQuery,
                    currentView,
                    selectedPostId: selectedPost ? selectedPost.id : null
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
            } catch (e) {
                console.warn('Ephemeral: could not save state', e);
            }
        }

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                const data = JSON.parse(raw);
                if (!data || !Array.isArray(data.posts)) return;
                posts.length = 0;
                data.posts.forEach((p) => {
                    posts.push({
                        ...p,
                        createdAt: new Date(p.createdAt),
                        expiresAt: new Date(p.expiresAt)
                    });
                });
                if (Array.isArray(data.likedPostIds)) {
                    likedPosts = new Set(data.likedPostIds);
                }
                if (data.newPost && typeof data.newPost === 'object') {
                    newPost = {
                        title: String(data.newPost.title ?? ''),
                        content: String(data.newPost.content ?? ''),
                        duration: typeof data.newPost.duration === 'number' ? data.newPost.duration : 24
                    };
                }
                if (typeof data.filter === 'string') filter = data.filter;
                if (typeof data.searchQuery === 'string') searchQuery = data.searchQuery;
                if (['home', 'post', 'write', 'profile'].includes(data.currentView)) {
                    currentView = data.currentView;
                } else {
                    currentView = 'home';
                }
                selectedPost = null;
                if (data.currentView === 'post' && data.selectedPostId != null) {
                    const found = posts.find((p) => p.id === data.selectedPostId);
                    if (found) {
                        selectedPost = found;
                    } else {
                        currentView = 'home';
                    }
                }
            } catch (e) {
                console.warn('Ephemeral: could not load state', e);
            }
        }

        loadState();

        function formatTimeRemaining(endDate) {
            const now = new Date();
            const diff = endDate - now;
            
            if (diff <= 0) return 'Expired';
            
            const hours = Math.floor(diff / (1000 * 60 * 60));
 const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            
            if (hours > 0) return `${hours}h ${minutes}m remaining`;
            return `${minutes}m remaining`;
        }

        function formatTimeAgo(date) {
            const now = new Date();
            const diff = now - date;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            
            if (hours < 1) return 'Just now';
            if (hours === 1) return '1 hour ago';
            if (hours < 24) return `${hours} hours ago`;
            return `${Math.floor(hours / 24)} days ago`;
        }

        function formatTimeCompact(endDate) {
            const now = new Date();
            const diff = endDate - now;
            if (diff <= 0) return "0h 0m";
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            return `${hours}h ${String(minutes).padStart(2, "0")}m`;
        }

        function formatThemeCountdown(endDate) {
            const now = new Date();
            let diff = endDate - now;
            if (diff <= 0) diff = 0;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            diff -= days * 24 * 60 * 60 * 1000;
            const hrs = Math.floor(diff / (1000 * 60 * 60));
            diff -= hrs * 60 * 60 * 1000;
            const min = Math.floor(diff / (1000 * 60));
            return {
                days: String(days).padStart(2, "0"),
                hrs: String(hrs).padStart(2, "0"),
                min: String(min).padStart(2, "0")
            };
        }

        function formatHoursRemainingShort(endDate) {
            const diff = endDate - Date.now();
            if (diff <= 0) return "0h";
            return `${Math.floor(diff / (1000 * 60 * 60))}h`;
        }

        function splitTitleTwoLines(title) {
            const words = title.trim().split(/\s+/);
            if (words.length <= 1) return { line1: title, line2: "" };
            const mid = Math.ceil(words.length / 2);
            return {
                line1: words.slice(0, mid).join(" "),
                line2: words.slice(mid).join(" ")
            };
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function showToast(message, tone = "accent") {
            const root = document.getElementById("toast-root");
            if (!root) return;
            const accent = tone === "accent";
            const iconBg = accent
                ? "bg-[rgba(200,169,110,0.16)] border-[rgba(200,169,110,0.45)]"
                : "bg-[rgba(90,84,68,0.35)] border-[rgba(200,169,110,0.12)]";
            const iconFg = accent ? "text-[#c8a96e]" : "text-[#a09880]";
            const checkSvg = `<svg class="h-5 w-5 ${iconFg}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`;
            const dashSvg = `<svg class="h-5 w-5 ${iconFg}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" d="M6 12h12"/></svg>`;
            const iconInner = accent ? checkSvg : dashSvg;

            const el = document.createElement("div");
            el.className = [
                "toast-item pointer-events-auto w-full sm:w-auto sm:min-w-[300px] sm:max-w-[min(100vw-3rem,24rem)]",
                "rounded-xl border border-[rgba(200,169,110,0.28)]",
                "bg-gradient-to-br from-[#1e1c16] via-[#15130f] to-[#0e0c09]",
                "px-4 py-4 sm:px-5 sm:py-4",
                "shadow-[0_16px_48px_rgba(0,0,0,0.55),0_0_0_1px_rgba(200,169,110,0.08),inset_0_1px_0_rgba(255,255,255,0.04)]"
            ].join(" ");
            el.setAttribute("role", "status");
            el.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl border ${iconBg} shadow-inner">${iconInner}</div>
                    <div class="min-w-0 flex-1 pt-0.5">
                        <p class="font-sans text-[9px] font-medium uppercase tracking-[1.8px] text-[#c8a96e]">Ephemeral</p>
                        <p class="mt-1.5 font-sans text-[15px] font-medium leading-snug tracking-[0.01em] text-[#f0ead8] sm:text-[16px]">${escapeHtml(message)}</p>
                    </div>
                </div>
            `;
            root.appendChild(el);
            requestAnimationFrame(() => el.classList.add("toast-item-visible"));
            setTimeout(() => {
                el.classList.add("toast-item-out");
                setTimeout(() => el.remove(), 260);
            }, 3200);
        }

        function renderPostBodyWithDropCap(content, variant = "desktop") {
            const isMobile = variant === "mobile";
            const bodyCls = isMobile
                ? "font-sans text-[15px] leading-[29.4px] tracking-[0.28px] text-[#a09880] text-justify"
                : "font-sans text-[18px] leading-[31.5px] text-[#a09880] text-justify";
            const dropCapCls = isMobile
                ? "float-left font-serif font-bold text-[64px] leading-[0.85] text-[#a09880] mr-2 mt-0.5 select-none"
                : "float-left font-serif font-bold text-[64px] leading-[0.85] text-[#a09880] mr-3 mt-1 select-none";
            const paraGap = isMobile ? "mt-9" : "mt-6";
            const blocks = content.trim().split(/\n\s*\n/).filter(Boolean);
            if (blocks.length === 0) return "";
            return blocks
                .map((block, i) => {
                    const text = escapeHtml(block.replace(/\n/g, " ").trim());
                    if (i === 0 && text.length > 0) {
                        const first = text[0];
                        const rest = text.slice(1);
                        return `<p class="post-lead ${bodyCls}">
                            <span class="${dropCapCls}" aria-hidden="true">${first}</span>${rest}
                        </p>`;
                    }
                    return `<p class="${bodyCls} ${i > 0 ? paraGap : ""}">${text}</p>`;
                })
                .join("");
        }

        function truncateExcerpt(text, maxLen) {
            if (text.length <= maxLen) return text;
            return text.slice(0, maxLen).trim() + "…";
        }

        function setTheme(theme) {
            document.documentElement.style.setProperty('--theme-accent', theme.color);
        }

        function navigate(view) {
            currentView = view;
            if (view !== 'post') selectedPost = null;
            persistState();
            render();
        }

        function goTrending() {
            filter = "trending";
            currentView = "home";
            selectedPost = null;
            persistState();
            render();
        }

        function goExpiring() {
            filter = "expiring";
            currentView = "home";
            selectedPost = null;
            persistState();
            render();
        }

        function selectPost(post) {
            selectedPost = post;
            navigate('post');
        }

        function likePost(postId, e) {
            e.stopPropagation();
            let msg;
            if (likedPosts.has(postId)) {
                likedPosts.delete(postId);
                msg = "Removed appreciation";
            } else {
                likedPosts.add(postId);
                msg = "Appreciation sent";
            }
            persistState();
            render();
            showToast(msg, likedPosts.has(postId) ? "accent" : "muted");
        }

        function publishPost() {
            if (!newPost.title.trim() || !newPost.content.trim()) return;
            
            const post = {
                id: Date.now(),
                title: newPost.title,
                content: newPost.content,
                author: authors[0],
                createdAt: new Date(),
                expiresAt: new Date(Date.now() + newPost.duration * 60 * 60 * 1000),
                likes: 0,
                readingTime: Math.ceil(newPost.content.split(' ').length / 200),

        function StoryRow(post, index, _total, soonestId) {
            const isLiked = likedPosts.has(post.id);
            const timeRemaining = formatTimeCompact(post.expiresAt);
            const totalMs = Math.max(1, post.expiresAt - post.createdAt);
            const remainingMs = Math.max(0, post.expiresAt - Date.now());
            const remainingPct = Math.max(0, Math.min(100, (remainingMs / totalMs) * 100));
            const num = String(index + 1).padStart(2, "0");
            const excerpt = truncateExcerpt(post.excerpt.replace(/…$/, ""), 118);
            const isUrgent = post.id === soonestId;
            const heartFill = isLiked ? "currentColor" : "none";
            const barInner = `
                        <div class="absolute bottom-0 left-0 right-0 bg-[#c8a96e] z-[1]" style="height: ${remainingPct}%;" aria-hidden="true"></div>
                        ${isUrgent ? `<div class="absolute bottom-0 left-0 right-0 top-3/4 bg-[#c04038] z-[2] pointer-events-none" aria-hidden="true"></div>` : ""}`;

        function setFilter(newFilter) {
            filter = newFilter;
            persistState();
            render();

        function setSearchQuery(query) {
            searchQuery = query;
            persistState();
            render();
        }

        function getFilteredPosts() {
            let filtered = [...posts];
            
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                filtered = filtered.filter(p => 
                    p.title.toLowerCase().includes(q) || 
                    p.content.toLowerCase().includes(q) ||
                    p.author.name.toLowerCase().includes(q)
                );
            }
            
            switch(filter) {
                case 'trending':
                    filtered.sort((a, b) => b.likes - a.likes);
                    break;
                case 'recent':
                    filtered.sort((a, b) => b.createdAt - a.createdAt);
                    break;
                case 'expiring':
                    filtered.sort((a, b) => a.expiresAt - b.expiresAt);
                    break;
            }
            
            return filtered;
        }

                                    <div class="flex w-full flex-row justify-between gap-8 lg:w-auto lg:flex-col lg:items-end lg:gap-[18px]">
                                        <div class="flex flex-col items-start gap-0.5 lg:items-end">
                                            <span class="font-serif text-[32px] leading-[36px] text-[#f0ead8] lg:text-[36px]">${likeCount}</span>
                                            <span class="font-sans text-[8px] uppercase tracking-[1.44px] text-[#5a5444]">Appreciations</span>
                                        </div>
                                        <div class="flex flex-col items-end gap-0.5">
                                            <span class="font-serif text-[32px] leading-[36px] text-[#f0ead8] lg:text-[36px]">${hoursShort}</span>
                                            <span class="font-sans text-[8px] uppercase tracking-[1.44px] text-[#5a5444]">Remaining</span>
                                        </div>
                                    </div>
                                    <div class="relative h-0.5 w-full overflow-hidden rounded-sm bg-[#181610] lg:max-w-[300px]">
                                        <div class="absolute inset-y-0 left-0 rounded-sm bg-gradient-to-r from-[#c8a96e] to-[#e8c98e]" style="width: ${remainingPct}%"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="pointer-events-none absolute bottom-0 left-6 right-6 h-[2px] bg-gradient-to-r from-[rgba(200,169,110,0.3)] to-transparent lg:left-[60px] lg:right-[60px]" aria-hidden="true"></div>
                        </section>

                        <article class="mx-auto max-w-[780px] px-6 py-10 lg:px-0 lg:py-12">
                            <div class="post-article-body">${bodyHtmlDesktop}</div>
                            <div class="mt-8 flex flex-col gap-2 border-t border-figma pt-7 sm:flex-row sm:items-center sm:justify-between" style="border-color: var(--theme-border);">
                                <button type="button" onclick="likePost(${selectedPost.id}, event)" class="focus-ring flex w-fit shrink-0 items-center border border-[rgba(200,169,110,0.15)] px-[25px] py-[13px] font-sans text-[10px] uppercase tracking-[1.5px] transition-colors ${isLiked ? "text-[#c8a96e]" : "text-[#a09880] hover:text-[#c8a96e]"}">
                                    <span class="whitespace-pre" aria-hidden="true">♡  ${likeCount} Appreciations</span>
                                    <span class="sr-only">${isLiked ? "Unlike" : "Like"}, ${likeCount} appreciations</span>
                                </button>
                                <p class="font-sans text-[9px] tracking-[0.9px] text-[#5a5444] sm:text-right">Fades in ${fadeCompact}</p>
                            </div>
                            <aside class="mt-8 border-l-2 border-[rgba(200,169,110,0.3)] bg-[#181610] pl-[22px] pr-5 pb-4 pt-2">
                                <p class="font-sans text-[8px] uppercase tracking-[1.76px] text-[#c8a96e]">On Impermanence</p>
                                <p class="mt-1.5 font-sans text-[10px] leading-[18px] text-[#5a5444]">
                                    <span class="block">This story exists only until the countdown ends. Once gone, it will be permanently removed from our</span>
                                    <span class="block">servers. No archives. No backups. Only the memory of those who chose to read it now.</span>
                                </p>
                            </aside>
                        </article>
                    </div>
                </div>
            `;
        }

        function WriteView() {
            const wordCount = newPost.content.split(/\s+/).filter((w) => w.length > 0).length;
            const minRead = Math.max(0, Math.ceil(wordCount / 200));
            const canPublish = newPost.title.trim() && newPost.content.trim();
            const themeBlurb = currentTheme.writeBlurb || "Share something honest before\nthe clock runs out.";
            const themeBlurbLines = themeBlurb.split("\n").filter(Boolean);
            const durationRowsDesktop = [
                [12, "12 hours", "Fleeting"],
                [24, "24 hours", "Standard"],
                [48, "48 hours", "Extended"]
            ];
            const durationOptions = durationRowsDesktop
                .map(([hours, label, tag]) => {
                    const on = newPost.duration === hours;
                    const rowCls = on
                        ? "border border-solid border-[#c8a96e] bg-[rgba(200,169,110,0.12)]"
                        : "border border-solid border-[rgba(200,169,110,0.08)] bg-transparent";
                    const mainCls = on ? "text-[#c8a96e]" : "text-[#a09880]";
                    const subCls = on ? "text-[#c8a96e]" : "text-[#a09880]";
                    return `
                        <button type="button" onclick="setDuration(${hours})" class="focus-ring flex w-full items-center justify-between px-[15px] py-[11px] transition-colors ${rowCls}">
                            <span class="font-sans text-[10px] tracking-[0.6px] ${mainCls}">${label}</span>
                            <span class="font-sans text-[8px] tracking-[0.6px] opacity-60 ${subCls}">${tag}</span>
                        </button>
                    `;
                })
                .join("");

            const durationRowsMobile = [
                [12, "12h", "Fleeting"],
                [24, "24h", "Standard"],
                [48, "48h", "Extended"]
            ];
            const durationOptionsMobile = durationRowsMobile
                .map(([hours, main, sub]) => {
                    const on = newPost.duration === hours;
                    const rowCls = on
                        ? "border border-solid border-[#c8a96e] bg-[rgba(200,169,110,0.12)]"
                        : "border border-solid border-[rgba(200,169,110,0.08)] bg-transparent";
                    const mainCls = on ? "text-[#c8a96e]" : "text-[#a09880]";
                    const subCls = on ? "text-[#c8a96e]" : "text-[#a09880]";
                    return `
                        <button type="button" onclick="setDuration(${hours})" class="focus-ring flex min-h-0 min-w-0 flex-1 flex-col items-center px-[7px] py-[11px] transition-colors ${rowCls}">
                            <span class="font-sans text-[10px] tracking-[0.4px] ${mainCls}">${main}</span>
                            <span class="mt-[3px] font-sans text-[8px] tracking-[0.48px] opacity-60 ${subCls}">${sub}</span>
                        </button>
                    `;
                })
                .join("");

            const publishBtnClass = canPublish
                ? "cursor-pointer opacity-100 hover:opacity-90"
                : "cursor-not-allowed opacity-40";

            const writeSidebar = `
                <aside class="flex w-full flex-col gap-8 bg-[#111009] px-8 py-12 lg:w-[356px] lg:max-w-[356px] lg:shrink-0 lg:self-stretch">
                    <div class="flex min-h-[90px] flex-col">
                        <p class="font-sans text-[8px] uppercase tracking-[1.76px] text-[#5a5444]">Current Theme</p>
                        <p class="mt-6 font-serif text-[18px] italic leading-normal text-[#c8a96e]">${currentTheme.name}</p>
                        <p class="mt-2 font-sans text-[10px] leading-[18px] text-[#5a5444]">
                            ${themeBlurbLines.map((line) => `<span class="block">${line}</span>`).join("")}
                        </p>
                    </div>
                    <div class="flex flex-col gap-3">
                        <p class="font-sans text-[8px] uppercase tracking-[1.76px] text-[#5a5444]">Visibility Duration</p>
                        <div class="flex flex-col gap-2">${durationOptions}</div>
                    </div>
                    <div class="flex flex-col gap-3">
                        <p class="font-sans text-[8px] uppercase tracking-[1.76px] text-[#5a5444]">Publishing As</p>
                        <div class="flex items-center gap-[10px] border-t border-b border-[rgba(200,169,110,0.08)] pt-[13px] pb-[17px]">
                            <div class="flex size-[34px] shrink-0 items-center justify-center rounded-[17px] border border-[rgba(200,169,110,0.15)] bg-[#201e14] font-sans text-[10px] text-[#a09880]">${authors[0].avatar}</div>
                            <div class="min-w-0">
                                <p class="font-sans text-[11px] text-[#f0ead8]">${authors[0].name}</p>
                                <p class="font-sans text-[9px] text-[#5a5444]">${authors[0].handle}</p>
                            </div>
                        </div>
                        <button type="button" onclick="${canPublish ? "publishPost()" : ""}" ${canPublish ? "" : "disabled"} class="focus-ring w-full bg-[#c8a96e] px-3 pb-[10px] pt-3 font-sans text-[10px] uppercase tracking-[2px] text-[#0a0907] transition-opacity ${canPublish ? "hover:opacity-90" : "cursor-not-allowed opacity-40"}">
                            Publish Story
                        </button>
                        <p class="text-center font-sans text-[9px] tracking-[0.72px] text-[#5a5444]">Add title and content to publish</p>
                    </div>
                </aside>
            `;

            return `
                <div class="write-shell relative min-h-screen bg-[#0a0907]">
                    <div class="lg:hidden">
                        <div class="fixed left-0 right-0 top-0 z-40 pt-[env(safe-area-inset-top,0px)]">
                            <div class="flex h-[52px] items-center justify-between border-b border-[rgba(200,169,110,0.08)] bg-[rgba(10,9,7,0.96)] px-[27px] pb-px">
                                <h1 class="font-serif text-[20px] italic leading-normal text-[#f0ead8]">New Story</h1>
                                <button type="button" onclick="navigate('home')" class="focus-ring font-sans text-[9px] uppercase tracking-[1.44px] text-[#5a5444] transition-colors hover:text-[#f0ead8]">Cancel</button>
                            </div>
                        </div>
                        <div class="relative pb-[calc(125px+env(safe-area-inset-bottom,0px))] pt-[calc(52px+env(safe-area-inset-top,0px))]">
                            <div class="flex flex-col gap-[9px] px-[27px] pb-5 pt-6">
                                <label for="write-title-mobile" class="font-sans text-[8px] uppercase tracking-[1.76px] text-[#5a5444]">Title</label>
                                <div class="border-b border-[rgba(200,169,110,0.08)] pb-[11px]">
                                    <input id="write-title-mobile" type="text" value="${escapeHtml(newPost.title)}" oninput="updatePostTitle(this.value)" placeholder="Give your story a name…" class="write-title-input w-full bg-transparent p-0 font-serif text-[24px] leading-normal text-[#f0ead8] placeholder:text-[#5a5444]" autocomplete="off" />
                                </div>
                                <div class="pt-[19px]">
                                    <label for="write-body-mobile" class="font-sans text-[8px] uppercase tracking-[1.76px] text-[#5a5444]">Your Story</label>
                                    <div class="pt-[3px]">
                                        <textarea id="write-body-mobile" oninput="updatePostContent(this.value)" placeholder="Write something that matters… This will disappear. Make it count." class="write-body-input h-[137px] min-h-[137px] w-full resize-y bg-transparent font-sans text-[12px] leading-[25.2px] text-[#f0ead8] placeholder:text-[#5a5444]"></textarea>
                                        <p class="mt-1 text-right font-sans text-[9px] tracking-[0.54px] text-[#5a5444]">${wordCount} words</p>
                                    </div>
                                </div>
                            </div>
                            <div class="ml-6 mr-5 h-px bg-[rgba(200,169,110,0.08)]" aria-hidden="true"></div>
                            <div class="flex flex-col gap-[10px] px-[27px] pb-5 pt-4">
                                <p class="font-sans text-[8px] uppercase tracking-[1.76px] text-[#5a5444]">Duration</p>
                                <div class="flex gap-2">${durationOptionsMobile}</div>
                            </div>
                            <div class="ml-6 mr-5 h-px bg-[rgba(200,169,110,0.08)]" aria-hidden="true"></div>
                            <div class="flex min-h-0 flex-col gap-3 pl-[27px] pr-5 pb-4 pt-8">
                                <p class="font-sans text-[8px] uppercase tracking-[1.76px] text-[#5a5444]">Publishing As</p>
                                <div class="flex items-center gap-[10px] border-t border-b border-[rgba(200,169,110,0.08)] py-[13px]">
                                    <div class="flex size-8 shrink-0 items-center justify-center rounded-[16px] border border-[rgba(200,169,110,0.15)] bg-[#201e14] font-sans text-[10px] text-[#a09880]">${authors[0].avatar}</div>
                                    <div class="min-w-0">
                                        <p class="font-sans text-[11px] text-[#f0ead8]">${authors[0].name}</p>
                                        <p class="font-sans text-[9px] text-[#5a5444]">${authors[0].handle}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="fixed bottom-[63px] left-0 right-0 z-40 border-t border-[rgba(200,169,110,0.08)] bg-[rgba(10,9,7,0.97)] px-[27px] pb-[20px] pt-[11px]">
                            <button type="button" onclick="${canPublish ? "publishPost()" : ""}" ${canPublish ? "" : "disabled"} class="focus-ring w-full bg-[#c8a96e] p-3 font-sans text-[10px] uppercase tracking-[2px] text-[#0a0907] transition-opacity ${publishBtnClass}">
                                Publish Story
                            </button>
                        </div>
                        ${MobileBottomNav()}
                    </div>

                    <div class="relative hidden min-h-screen lg:block lg:pt-[calc(3.5rem+env(safe-area-inset-top,0px))]">
                        <div class="pointer-events-none absolute inset-0 z-0 write-gradient-bg" aria-hidden="true"></div>
                        <div class="relative z-10 mx-auto grid max-w-[1440px] grid-cols-1 lg:grid-cols-[minmax(0,1fr)_356px]">
                            <div class="flex min-w-0 flex-col border-figma px-6 pb-16 pt-10 lg:border-r lg:px-[60px] lg:pb-12 lg:pt-12" style="border-color: rgba(200, 169, 110, 0.08);">
                                <div class="flex items-baseline justify-between gap-6">
                                    <h2 class="font-serif text-[28px] italic leading-normal text-[#f0ead8]">Write Your Story</h2>
                                    <button type="button" onclick="navigate('home')" class="focus-ring shrink-0 font-sans text-[9px] uppercase tracking-[1.62px] text-[#5a5444] transition-colors hover:text-[#f0ead8]">Cancel</button>
                                </div>
                                <div class="mt-[53px]">
                                    <label for="write-title-desktop" class="block font-sans text-[8px] uppercase tracking-[1.76px] text-[#5a5444]">Title</label>
                                    <div class="mt-[14px] border-b border-[rgba(200,169,110,0.08)] pb-[13px]">
                                        <input id="write-title-desktop" type="text" value="${escapeHtml(newPost.title)}" oninput="updatePostTitle(this.value)" placeholder="Give your story a name…" class="write-title-input w-full bg-transparent p-0 font-serif text-[32px] leading-normal text-[#f0ead8] placeholder:text-[#5a5444]" autocomplete="off" />
                                    </div>
                                </div>
                                <div class="mt-12 lg:mt-[48px]">
                                    <label for="write-body-desktop" class="block font-sans text-[8px] uppercase tracking-[1.76px] text-[#5a5444]">Your Story</label>
                                    <div class="mt-[21px] flex min-h-[300px] flex-col">
                                        <textarea id="write-body-desktop" oninput="updatePostContent(this.value)" placeholder="Write something that matters… This will disappear. Make it count." class="write-body-input min-h-[300px] w-full flex-1 resize-y bg-transparent font-sans text-[13px] leading-[27.3px] tracking-[0.26px] text-[#f0ead8] placeholder:text-[#5a5444]"></textarea>
                                        <p class="mt-4 text-right font-sans text-[10px] text-[#5a5444] lg:mt-6">${wordCount} words · ~${minRead} min read</p>
                                    </div>
                                </div>
                            </div>
                            <div class="border-t border-figma lg:border-t-0" style="border-color: rgba(200, 169, 110, 0.08);">
                                ${writeSidebar}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function updatePostTitle(title) {
            newPost.title = title;
            persistState();
            render();
        }

        function updatePostContent(content) {
            newPost.content = content;
            persistState();
            render();
        }

        function setDuration(hours) {
            newPost.duration = hours;
            persistState();
            render();
        }

        function captureInputFocusState() {
            const el = document.activeElement;
            if (!el || (el.tagName !== "INPUT" && el.tagName !== "TEXTAREA")) return null;
            if (!el.id) return null;
            const state = { id: el.id };
            if (typeof el.selectionStart === "number" && typeof el.selectionEnd === "number") {
                state.start = el.selectionStart;
                state.end = el.selectionEnd;
            }
            return state;
        }

        function restoreInputFocusState(state) {
            if (!state || !state.id) return;
            const el = document.getElementById(state.id);
            if (!el || (el.tagName !== "INPUT" && el.tagName !== "TEXTAREA")) return;
            el.focus();
            if (typeof state.start === "number" && typeof state.end === "number" && typeof el.setSelectionRange === "function") {
                try {
                    const n = el.value.length;
                    const a = Math.max(0, Math.min(state.start, n));
                    const b = Math.max(0, Math.min(state.end, n));
                    el.setSelectionRange(a, b);
                } catch (_) {}
            }
        }

        function render() {
            const focusState = captureInputFocusState();
            const app = document.getElementById('app');
            
            let content = '';
            switch(currentView) {
                case 'home':
                    content = HomeView();
                    break;
                case 'post':
                    content = PostDetailView();
                    break;
                case 'write':
                    content = WriteView();
                    break;
                case 'profile':
                    content = ProfileView();
                    break;
            }
            
            app.innerHTML = Header() + content;

            if (currentView === 'write') {
                document.querySelectorAll('.write-title-input').forEach((el) => {
                    el.value = newPost.title;
                });
                document.querySelectorAll('.write-body-input').forEach((el) => {
                    el.value = newPost.content;
                });
            }

            restoreInputFocusState(focusState);
        }

        setTheme(currentTheme);
        render();

        setInterval(() => {
            if (currentView === 'home' || currentView === 'post') {
                render();
            }
        }, 60000);
    </script>
</body>
</html>
